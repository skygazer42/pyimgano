<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Scan line -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" rx="12" fill="url(#bg)"/>
  <rect width="900" height="220" rx="12" fill="url(#grid)"/>

  <!-- Decorative scan lines -->
  <rect x="0" y="88" width="900" height="1" fill="url(#scanGrad)" opacity="0.4"/>
  <rect x="0" y="132" width="900" height="1" fill="url(#scanGrad)" opacity="0.25"/>

  <!-- Left: Stylized inspection icon -->
  <g transform="translate(80, 50)">
    <!-- Image frame -->
    <rect x="0" y="0" width="100" height="100" rx="8" fill="none" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
    <!-- Image content (abstract grid) -->
    <rect x="12" y="12" width="18" height="18" rx="2" fill="#334155"/>
    <rect x="36" y="12" width="18" height="18" rx="2" fill="#334155"/>
    <rect x="60" y="12" width="18" height="18" rx="2" fill="#334155"/>
    <rect x="12" y="36" width="18" height="18" rx="2" fill="#334155"/>
    <rect x="36" y="36" width="18" height="18" rx="2" fill="#475569"/>
    <rect x="60" y="36" width="18" height="18" rx="2" fill="#334155"/>
    <rect x="12" y="60" width="18" height="18" rx="2" fill="#334155"/>
    <rect x="36" y="60" width="18" height="18" rx="2" fill="#334155"/>
    <rect x="60" y="60" width="18" height="18" rx="2" fill="#334155"/>

    <!-- Anomaly highlight -->
    <rect x="33" y="33" width="24" height="24" rx="3" fill="none" stroke="#f472b6" stroke-width="2" filter="url(#glow)"/>
    <circle cx="45" cy="45" r="3" fill="#f472b6" opacity="0.8"/>

    <!-- Magnifying scan overlay -->
    <circle cx="72" cy="28" r="20" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
    <line x1="86" y1="42" x2="96" y2="52" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>

    <!-- Detection label -->
    <rect x="0" y="108" width="100" height="18" rx="4" fill="#f472b6" opacity="0.15"/>
    <text x="50" y="121" text-anchor="middle" font-family="monospace" font-size="10" fill="#f472b6" font-weight="600">ANOMALY ˛</text>
  </g>

  <!-- Center: Title -->
  <g transform="translate(450, 65)">
    <text x="0" y="0" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#accent)" letter-spacing="-1">pyimgano</text>
    <text x="0" y="36" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="16" fill="#94a3b8" font-weight="400" letter-spacing="3">VISUAL ANOMALY DETECTION</text>
    <text x="0" y="62" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="13" fill="#64748b" font-weight="400" letter-spacing="1">Production-oriented · 120+ Models · Industrial Inspection</text>
  </g>

  <!-- Right: Stats pills -->
  <g transform="translate(690, 50)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="140" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="16" y="19" font-family="monospace" font-size="11" fill="#38bdf8">Ď</text>
    <text x="30" y="19" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#cbd5e1">120+ Models</text>

    <!-- Pill 2 -->
    <rect x="0" y="36" width="140" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="16" y="55" font-family="monospace" font-size="11" fill="#818cf8">Ď</text>
    <text x="30" y="55" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Image + Pixel</text>

    <!-- Pill 3 -->
    <rect x="0" y="72" width="140" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="16" y="91" font-family="monospace" font-size="11" fill="#f472b6">Ď</text>
    <text x="30" y="91" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Deploy-ready</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="80" y="200" width="740" height="2" rx="1" fill="url(#accent2)" opacity="0.3"/>

  <!-- Version tag -->
  <g transform="translate(450, 195)">
    <rect x="-30" y="-12" width="60" height="20" rx="10" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
    <text x="0" y="2" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">v0.6</text>
  </g>
</svg>
