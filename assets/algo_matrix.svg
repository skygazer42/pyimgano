    <text x="110" y="12" font-family="monospace" font-size="12" fill="#fbbf24">~</text>
    <text x="126" y="12" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Partial / model-dependent</text>
    <text x="300" y="12" font-family="monospace" font-size="12" fill="#475569">-</text>
    <text x="316" y="12" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Not applicable</text>
