sonar.organization=skygazer42
sonar.projectKey=skygazer42_pyimgano
sonar.projectName=pyimgano

# Keep SonarCloud focused on production/runtime code. The repo contains a large
# test and documentation corpus that can drown out signal and create noisy
# security hotspot review requirements.
sonar.sources=pyimgano,tools
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.pytest_cache/**,**/.worktrees/**,tests/**,docs/**,examples/**,benchmarks/**,third_party/**,htmlcov/**,.github/**
sonar.cpd.exclusions=tests/**,docs/**,examples/**,.github/**
sonar.issue.ignore.multicriteria=tests_float_eq,tests_name_style,tests_rng,tests_param_count,tests_path_taint,tests_same_branch,tests_regex_complexity,tests_runtime_bug,examples_complexity,examples_comment_code,examples_literals,examples_unused
sonar.issue.ignore.multicriteria.tests_float_eq.ruleKey=python:S1244
sonar.issue.ignore.multicriteria.tests_float_eq.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.tests_name_style.ruleKey=python:S117
sonar.issue.ignore.multicriteria.tests_name_style.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.tests_rng.ruleKey=python:S5754
sonar.issue.ignore.multicriteria.tests_rng.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.tests_param_count.ruleKey=python:S107
sonar.issue.ignore.multicriteria.tests_param_count.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.tests_path_taint.ruleKey=pythonsecurity:S2083
sonar.issue.ignore.multicriteria.tests_path_taint.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.tests_same_branch.ruleKey=python:S3923
sonar.issue.ignore.multicriteria.tests_same_branch.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.tests_regex_complexity.ruleKey=python:S1542
sonar.issue.ignore.multicriteria.tests_regex_complexity.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.tests_runtime_bug.ruleKey=pythonbugs:S6466
sonar.issue.ignore.multicriteria.tests_runtime_bug.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.examples_complexity.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.examples_complexity.resourceKey=examples/**/*
sonar.issue.ignore.multicriteria.examples_comment_code.ruleKey=python:S125
sonar.issue.ignore.multicriteria.examples_comment_code.resourceKey=examples/**/*
sonar.issue.ignore.multicriteria.examples_literals.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.examples_literals.resourceKey=examples/**/*
sonar.issue.ignore.multicriteria.examples_unused.ruleKey=python:S1481
sonar.issue.ignore.multicriteria.examples_unused.resourceKey=examples/**/*

# CI generates coverage.xml at repo root via pytest-cov.
sonar.python.coverage.reportPaths=coverage.xml
