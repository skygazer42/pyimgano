name: SonarQube Cloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarQube Cloud Scan
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-sonar-py311-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-sonar-py311-pip-

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Sonar coverage imports metadata/signature tests that touch optional
          # deep and skimage-backed models during collection.
          pip install -e .[dev,torch,skimage]

      - name: Read project version
        id: project-version
        run: |
          echo "value=$(python - <<'PY'
          from importlib.metadata import version

          print(version('pyimgano'))
          PY
          )" >> "$GITHUB_OUTPUT"

      - name: Resolve Sonar token
        id: sonar-token
        env:
          SONAR_TOKEN_CANDIDATE: ${{ secrets.SONAR_TOKEN }}
          SONARQUBE_TOKEN_CANDIDATE: ${{ secrets.SONARQUBE_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN_CANDIDATE" ]; then
            echo "value=$SONAR_TOKEN_CANDIDATE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$SONARQUBE_TOKEN_CANDIDATE" ]; then
            echo "value=$SONARQUBE_TOKEN_CANDIDATE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Missing SONAR_TOKEN or SONARQUBE_TOKEN secret." >&2
          exit 1

      - name: Run test suite with coverage
        run: pytest -v --cov=pyimgano --cov-report=xml --cov-report=term-missing

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ steps.sonar-token.outputs.value }}
        with:
          args: >
            "-Dsonar.projectVersion=${{ steps.project-version.outputs.value }}"
