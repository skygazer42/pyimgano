name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Run lint suite
        run: tox -e lint

      - name: Audit repository links
        run: python tools/audit_repo_links.py

      - name: Audit adoption docs
        run: python tools/audit_adoption_docs.py

      - name: Audit translated entrypoints
        run: python tools/audit_translation_entrypoints.py

      - name: Audit release surface
        run: python tools/audit_release_surface.py

      - name: Audit official benchmark configs
        run: python tools/audit_benchmark_configs.py

      - name: Audit audited fast-path docs
        run: python tools/audit_audited_fastpath_docs.py

      - name: Audit deploy-smoke docs
        run: python tools/audit_deploy_smoke_docs.py

      - name: Audit recipe starters
        run: python tools/audit_recipe_starters.py

      - name: Audit release checklist
        run: python tools/audit_release_checklist.py

      - name: Audit publication contract
        run: python tools/audit_publication_contract.py

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-pip-

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[dev,torch,skimage]

      - name: Audit public API
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: python tools/audit_public_api.py

      - name: Audit registry
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: python tools/audit_registry.py

      - name: Run tests
        run: |
          pytest -v --cov=pyimgano --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.9'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [quality, test, deploy_smoke]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] safety

      - name: Run bandit security check
        run: bandit -r pyimgano -c pyproject.toml -ll

      - name: Check dependencies for known vulnerabilities
        run: safety scan --output json
        continue-on-error: true

  deploy_smoke:
    name: Deploy Smoke Path
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[dev,skimage]

      - name: Run deploy-smoke chain
        run: |
          pyimgano-doctor --profile deploy-smoke --json
          pyimgano-demo --smoke --dataset-root ./_demo_custom_dataset --output-dir ./_demo_suite_run --summary-json /tmp/pyimgano_demo_summary.json --no-pretrained
          python - <<'PY'
          import json
          from pathlib import Path

          src = Path("examples/configs/deploy_smoke_custom_cpu.json")
          dst = Path("/tmp/deploy_smoke_ci.json")
          payload = json.loads(src.read_text(encoding="utf-8"))
          payload["dataset"]["root"] = "./_demo_custom_dataset"
          payload["output"]["output_dir"] = "./_deploy_smoke_run"
          dst.write_text(json.dumps(payload), encoding="utf-8")
          PY
          pyimgano-train --config /tmp/deploy_smoke_ci.json --export-infer-config --export-deploy-bundle
          pyimgano validate-infer-config ./_deploy_smoke_run/deploy_bundle/infer_config.json
          pyimgano bundle validate ./_deploy_smoke_run/deploy_bundle --json
          pyimgano runs quality ./_deploy_smoke_run --json
          pyimgano runs acceptance ./_deploy_smoke_run --json
