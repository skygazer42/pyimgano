name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_pypi:
        description: 'Publish to Test PyPI'
        required: true
        type: boolean
        default: true

jobs:
  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Check release tag matches package version
        if: github.event_name == 'release'
        run: python tools/audit_release_version.py --tag "$GITHUB_REF_NAME"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[dev]

      - name: Audit release surface
        run: python tools/audit_release_surface.py

      - name: Audit adoption docs
        run: python tools/audit_adoption_docs.py

      - name: Audit audited fast-path docs
        run: python tools/audit_audited_fastpath_docs.py

      - name: Audit deploy-smoke docs
        run: python tools/audit_deploy_smoke_docs.py

      - name: Audit recipe starters
        run: python tools/audit_recipe_starters.py

      - name: Audit release checklist
        run: python tools/audit_release_checklist.py

      - name: Run release deploy-smoke chain
        run: |
          pyimgano-doctor --profile deploy-smoke --json
          pyimgano-demo --smoke --dataset-root ./_demo_custom_dataset --output-dir ./_demo_suite_run --summary-json /tmp/pyimgano_demo_summary.json --no-pretrained
          python - <<'PY'
          import json
          from pathlib import Path

          src = Path("examples/configs/deploy_smoke_custom_cpu.json")
          dst = Path("/tmp/release_deploy_smoke.json")
          payload = json.loads(src.read_text(encoding="utf-8"))
          payload["dataset"]["root"] = "./_demo_custom_dataset"
          payload["output"]["output_dir"] = "./_release_deploy_smoke_run"
          dst.write_text(json.dumps(payload), encoding="utf-8")
          PY
          pyimgano-train --config /tmp/release_deploy_smoke.json --export-infer-config --export-deploy-bundle
          pyimgano validate-infer-config ./_release_deploy_smoke_run/deploy_bundle/infer_config.json
          pyimgano bundle validate ./_release_deploy_smoke_run/deploy_bundle --json
          pyimgano runs quality ./_release_deploy_smoke_run --json
          pyimgano runs acceptance ./_release_deploy_smoke_run --require-status audited --check-bundle-hashes --json

  build-and-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    needs: [release-readiness]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to Test PyPI
        if: github.event_name == 'workflow_dispatch' && inputs.test_pypi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          twine upload --repository testpypi dist/*

      - name: Publish to PyPI
        if: github.event_name == 'release'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*
